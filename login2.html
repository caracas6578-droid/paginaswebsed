<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto .dev - Eddy Pinto</title>
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <header class="navbar-tech">
      <nav class="nav-container">
        <div class="nav-logo">EP<span>.dev</span></div>
        <ul class="nav-links">
          <li><a href="index2.html">Inicio</a></li>
          <li><a href="index2.html#datos">Datos</a></li>
          <li><a href="index2.html#habilidades">Habilidades</a></li>
          <li><a href="login2.html" class="btn-contacto-nav">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <main class="main-container">
      <section class="section-container">
        <h2>Hablemos de Código</h2>

        <form class="form-tech">
          <div class="input-group">
            <label for="nombre">Nombre o Empresa</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Eddy Pinto"
              required
            />
          </div>

          <div class="input-group">
            <label for="email">Correo Electrónico</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="eddy@dev.com"
              required
            />
          </div>

          <div class="input-group">
            <label for="asunto">Asunto</label>
            <select id="asunto" name="asunto">
              <option value="proyecto">Nuevo Proyecto</option>
              <option value="colaboracion">Colaboración</option>
              <option value="otro">Otro</option>
            </select>
          </div>

          <div class="input-group">
            <label for="mensaje">Mensaje</label>
            <textarea
              id="mensaje"
              name="mensaje"
              placeholder="Escribe tu idea aquí..."
              required
            ></textarea>
          </div>

          <button type="submit" class="btn-submit-tech">Enviar Mensaje</button>
        </form>
      </section>
    </main>

    <footer class="main-footer">
      <p>Copyright © 2023 Eddy Pinto. Todos los derechos reservados.</p>
    </footer>
  </body>
</html>
