<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto | CineMundo</title>
    <link rel="stylesheet" href="style.css?v=5" />
    <link rel="shortcut icon" href="logo.png" type="image/png" />
  </head>
  <body>
    <video autoplay loop muted playsinline id="video-background">
      <source src="video/16160-269534741_medium.mp4" type="video/mp4" />
      Tu navegador no soporta videos HTML5.
    </video>
    <header class="navbar">
      <div class="logo">CineMundo</div>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <nav class="nav-links" id="nav-links">
        <a href="index.html" class="btn-primary" style="text-decoration: none"
          >&larr; Regresar al Inicio</a
        >
      </nav>
    </header>

    <div class="container">
      <main style="flex: 1; display: flex; justify-content: center">
        <section
          class="movie-card"
          style="
            padding: 3rem;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
          "
        >
          <h1
            style="
              color: var(--primary-color);
              margin-bottom: 0.5rem;
              text-align: center;
            "
          >
            Contáctanos
          </h1>
          <p style="text-align: center; margin-bottom: 2rem; color: #94a3b8">
            ¿Tienes dudas o sugerencias? Escríbenos y te responderemos pronto.
          </p>

          <form id="contactForm">
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" placeholder="Tu nombre" required />

            <label for="email">Correo electrónico:</label>
            <input
              type="email"
              id="email"
              placeholder="tu@correo.com"
              required
            />

            <label for="mensaje">Mensaje:</label>
            <textarea
              id="mensaje"
              rows="5"
              placeholder="Escribe tu mensaje aquí..."
              required
            ></textarea>

            <button type="submit" class="btn-primary" style="margin-top: 1rem">
              Enviar Mensaje
            </button>
          </form>
        </section>
      </main>
    </div>

    <footer class="site-footer">
      <div class="footer-content">
        <div class="footer-logo">CineMundo</div>
        <p>&copy; 2026 CineMundo. Todos los derechos reservados.</p>
        <div class="footer-links">
          <a href="indexP.html">Política de Privacidad</a>
          <a href="indexT.html">Términos de Servicio</a>
          <a href="indexC.html">Contacto</a>
        </div>
      </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js?v=2"></script>

    <script>
      $(document).ready(function () {
        $("#contactForm").submit(function (e) {
          e.preventDefault();
          Swal.fire({
            icon: "success",
            title: "¡Mensaje Enviado!",
            text: "Nos pondremos en contacto contigo a la brevedad.",
            background: "#1e293b",
            color: "#fff",
          });
          $(this)[0].reset();
        });
      });
    </script>
  </body>
</html>
