name: Integración Continua (CI)

on:
  pull_request:
    branches:
      - main

jobs:
  revisar_y_probar:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Preparar entorno Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar dependencias
      run: npm install

    - name: Ejecutar Linter (formato)
      run: npm run lint

    - name: Ejecutar Tests automáticos
      run: npm test